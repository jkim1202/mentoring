services:
  mysql:
    image: mysql:8.4
    container_name: mentoring-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ${DB_NAME:-mentoring}
      MYSQL_USER: ${DB_USERNAME:-mentoring_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-change-me}
      TZ: ${APP_TIMEZONE:-Asia/Seoul}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$$MYSQL_USER -p$$MYSQL_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  mysql_data:
