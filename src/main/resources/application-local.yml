spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:mentoring}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:1234}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true # 쿼리를 콘솔에 바로 출력
    properties:
      hibernate:
        format_sql: true # 쿼리를 예쁘게 정렬
        highlight_sql: true # 쿼리에 색상 추가 (최신 버전 하이버네이트 지원)
    open-in-view: false # 정말 잘하신 설정입니다! (성능 및 커넥션 관리 최적화)
    database-platform: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
logging:
  level:
    org.hibernate.SQL: debug
    # 쿼리 파라미터(값)까지 보고 싶을 때 추가하세요
    org.hibernate.orm.jdbc.bind: trace
    org.springframework.security: ${SPRING_SECURITY_LOG_LEVEL:INFO} # 평소엔 INFO, 문제 시 TRACE
  pattern:
    console: ${LOGPATTERN_CONSOLE:%green(%d{HH:mm:ss.SSS}) %blue(%-5level) %red([%thread]) %yellow(%logger{15}) - %msg%n}

security:
  jwt:
    secret: ${JWT_ACCESS_SECRET:local-access-secret-change-me}
    refresh-secret: ${JWT_REFRESH_SECRET:local-refresh-secret-change-me}
    access-exp-minutes: ${JWT_ACCESS_EXP_MINUTES:30}
    refresh-exp-days: ${JWT_REFRESH_EXP_DAYS:14}
